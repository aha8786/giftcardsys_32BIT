name: Build Cross Platform

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller Pillow

      - name: Build release package
        run: python scripts/build_release.py

      - name: Upload macOS app and dmg
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: GiftCardSys-macos
          path: |
            dist/GiftCardSys.app
            dist/GiftCardSys-installer.dmg
          if-no-files-found: warn

      - name: Upload Windows package
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: GiftCardSys-windows
          path: dist/release/GiftCardSys-windows.zip
          if-no-files-found: error

      - name: Upload Linux package
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: GiftCardSys-linux
          path: dist/release/GiftCardSys-linux.tar.gz
          if-no-files-found: error
